<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>تحديث زمزم</title>
<style>
body{font-family:Cairo,sans-serif;background:#f5f5f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border-radius:20px;padding:30px;text-align:center;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.icon{font-size:60px;margin-bottom:16px}
h2{color:#2d5016;margin-bottom:8px;font-size:20px}
p{color:#6b7280;font-size:13px;margin-bottom:20px}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#2d5016,#4a7c2f);color:#fff;border-radius:12px;font-size:15px;font-weight:900;text-decoration:none;box-sizing:border-box}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔄</div>
  <h2>جاري التحديث...</h2>
  <p id="msg">يتم مسح البيانات القديمة</p>
  <a href="/" class="btn" id="btn">العودة للتطبيق</a>
</div>
<script>
try {
  localStorage.clear();
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  }
  document.getElementById('msg').textContent = '✅ تم بنجاح! جاري فتح التطبيق...';
  setTimeout(() => { window.location.href = '/'; }, 1500);
} catch(e) {
  document.getElementById('msg').textContent = 'اضغط الزر للمتابعة';
}
</script>
</body>
</html>
