function log(msg, type='') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function doRestore() {
  const btn = document.getElementById('restoreBtn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الاستعادة...';

  try {
    log('🔌 جاري الاتصال بـ Firebase...');

    // Restore Menu
    log('📦 رفع المنيو...');
    await db.ref('menu').set(MENU_DATA);
    log('✅ تم رفع المنيو — 10 أقسام', 'success');

    // Restore Main Groups
    log('🗂️ رفع الأقسام الرئيسية...');
    await db.ref('config/mainGroups').set(MAIN_GROUPS_DATA);
    log('✅ تم رفع الأقسام الرئيسية', 'success');

    log('');
    log('🎉 تمت الاستعادة بنجاح!', 'success');
    log('يمكنك إغلاق هذه الصفحة والعودة للتطبيق', 'success');

    btn.textContent = '✅ تمت الاستعادة';
    btn.style.background = 'linear-gradient(135deg,#16a34a,#22c55e)';

  } catch(e) {
    log('❌ خطأ: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '🔄 حاول مرة أخرى';
  }
}
